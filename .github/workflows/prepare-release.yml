name: Prepare Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # When changesets exist, create a release PR
  # NOTE: Skips when a release PR is merged (release.yml handles that)
  prepare-release:
    runs-on: ubuntu-latest
    # Skip if this is a release PR merge (handled by create-release-tag job below)
    if: "!contains(github.event.head_commit.message, 'chore: prepare release')"
    steps:
      # Use PAT so PR creation triggers CI workflows
      # (GITHUB_TOKEN events don't trigger other workflows)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Check for changesets
        id: check
        run: |
          # Count markdown files in .changeset (excluding README)
          CHANGESET_COUNT=$(find .changeset -name "*.md" ! -name "README.md" 2>/dev/null | wc -l | tr -d ' ')
          echo "changeset_count=$CHANGESET_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$CHANGESET_COUNT" -gt 0 ]; then
            echo "Found $CHANGESET_COUNT changeset(s)"
          else
            echo "No changesets found, skipping release preparation"
          fi

      - name: Setup Rust toolchain
        if: steps.check.outputs.changeset_count > 0
        run: rustup show

      - name: Cache Rust build
        if: steps.check.outputs.changeset_count > 0
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Knope runs `npm install --package-lock-only` to regenerate the lockfile.
      # The CI jobs that consume the produced release PR (Format / VSCode /
      # ESLint Plugin) all use `actions/setup-node` with Node 24 (npm 11). npm
      # 10 (the runner default) and npm 11 write structurally different
      # lockfiles for optional deps that aren't yet on the registry — so a
      # lockfile produced here without setup-node fails `npm ci` over there
      # with `Missing: @graphql-analyzer/core-* from lock file`. Pin Node 24
      # to match CI.
      - name: Setup Node.js
        if: steps.check.outputs.changeset_count > 0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Install knope
        if: steps.check.outputs.changeset_count > 0
        uses: knope-dev/action@19617851f9f13ab2f27a05989c55efb18aca3675 # v2.1.2

      - name: Configure git
        if: steps.check.outputs.changeset_count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run knope prepare-release
        if: steps.check.outputs.changeset_count > 0
        run: knope prepare-release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
