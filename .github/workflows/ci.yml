name: CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - "editors/vscode/**/*.ts"
      - "editors/vscode/package.json"
      - "editors/vscode/tsconfig.json"
      - "packages/**"
      - "test-workspace/**/*.ts"
      - "test-workspace/**/*.tsx"
      - "test-workspace/**/*.js"
      - "test-workspace/**/*.mjs"
      - "**/*.graphql"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "mise.toml"
      - ".npmrc"
      - "CHANGELOG.md"
      - ".github/workflows/**"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-test"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@2e807a7ddd7369dd12a3ec9a19d156f0660ecc9e # nextest
        with:
          tool: nextest

      - name: Run tests
        run: cargo nextest run --workspace --all-features

      - name: Run doctests
        run: cargo test --workspace --doc

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-lint"

      - name: Run rustfmt
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-build"

      - name: Build workspace
        run: cargo build --workspace --all-features --verbose

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-check"

      - name: Check workspace
        run: cargo check --workspace --all-features --verbose

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-coverage"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@2e807a7ddd7369dd12a3ec9a19d156f0660ecc9e # nextest
        with:
          tool: nextest

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@3771e22aa892e03fd35585fae288baad1755695c # v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov nextest --workspace --all-features --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  dogfood:
    name: Dogfood GraphQL Check
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-build"

      - name: Run graphql check
        continue-on-error: true
        run: cargo run --bin graphql -- --project pokemon check --format github

  vscode-extension:
    name: VSCode Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup mise + pnpm
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          experimental: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        working-directory: editors/vscode
        run: pnpm run test:unit

      - name: Build extension
        working-directory: editors/vscode
        run: pnpm run compile

  eslint-plugin:
    name: ESLint Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-eslint-plugin"

      - name: Setup mise + pnpm
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          experimental: true

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build @graphql-analyzer/core native addon
        run: pnpm --filter @graphql-analyzer/core run build:debug

      - name: Build @graphql-analyzer/eslint-plugin
        run: pnpm --filter @graphql-analyzer/eslint-plugin run build

      - name: Run plugin tests
        run: pnpm --filter @graphql-analyzer/eslint-plugin run test:unit

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup mise + pnpm
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          experimental: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Debug info
        run: |
          echo "Node version: $(node --version)"
          echo "pnpm version: $(pnpm --version)"
          echo "oxfmt version: $(pnpm exec oxfmt --version)"
          echo "Git SHA: $(git rev-parse HEAD)"
          echo "CLAUDE.md hash: $(git hash-object .claude/CLAUDE.md)"
          echo "hir README hash: $(git hash-object crates/hir/README.md)"

      - name: Check formatting
        run: pnpm run fmt:check

      - name: Lint
        run: pnpm run lint

      - name: TypeScript type check
        run: pnpm run typecheck

  release-prep:
    name: Release Prep Simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup mise + pnpm
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          experimental: true

      - name: Simulate knope's release-prep
        run: node scripts/check-release-prep.mjs

  web:
    name: Web Playground
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: |
          rustup show
          rustup target add wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-web"

      - name: Install wasm-pack
        uses: taiki-e/install-action@3771e22aa892e03fd35585fae288baad1755695c # v2
        with:
          tool: wasm-pack

      - name: Check wasm-feature build of graphql-lsp
        run: cargo check -p graphql-lsp --no-default-features --features wasm

      - name: Check graphql-lsp-wasm for wasm32-unknown-unknown
        run: cargo check -p graphql-lsp-wasm --target wasm32-unknown-unknown

      - name: Setup mise + pnpm
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          experimental: true

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build wasm bundle (release)
        run: wasm-pack build crates/lsp-wasm --target web --out-dir $GITHUB_WORKSPACE/packages/web-ide/src/wasm --release

      - name: TypeScript check
        working-directory: packages/web-ide
        run: pnpm exec tsc --noEmit

      - name: Build playground (Vite)
        run: pnpm --filter @graphql-analyzer/web-ide run build

      - name: Install Playwright browsers
        working-directory: packages/web-ide
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: pnpm --filter @graphql-analyzer/web-ide run test:e2e

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        test,
        lint,
        build,
        check,
        dogfood,
        vscode-extension,
        eslint-plugin,
        format,
        release-prep,
        web,
      ]
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed or were skipped"
