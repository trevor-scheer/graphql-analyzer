name: CI

on:
  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - "editors/vscode/**/*.ts"
      - "editors/vscode/package.json"
      - "editors/vscode/package-lock.json"
      - "editors/vscode/tsconfig.json"
      - "packages/**"
      - "test-workspace/**/*.ts"
      - "test-workspace/**/*.tsx"
      - "test-workspace/**/*.js"
      - "test-workspace/**/*.mjs"
      - "**/*.graphql"
      - "package.json"
      - "package-lock.json"
      - "CHANGELOG.md"
      - ".github/workflows/**"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-test"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@e537394e10461340f56469a03c3e73f1705074a9 # nextest
        with:
          tool: nextest

      - name: Run tests
        run: cargo nextest run --workspace --all-features

      - name: Run doctests
        run: cargo test --workspace --doc

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-lint"

      - name: Run rustfmt
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-build"

      - name: Build workspace
        run: cargo build --workspace --all-features --verbose

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-check"

      - name: Check workspace
        run: cargo check --workspace --all-features --verbose

  dogfood:
    name: Dogfood GraphQL Check
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-build"

      - name: Run graphql check
        continue-on-error: true
        run: cargo run --bin graphql -- --project pokemon check --format github

  vscode-extension:
    name: VSCode Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: "npm"
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Unit tests
        working-directory: editors/vscode
        run: npm run test:unit

      - name: Build extension
        working-directory: editors/vscode
        run: npm run compile

  eslint-plugin:
    name: ESLint Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-eslint-plugin"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: "npm"

      - name: Install workspace deps
        run: npm ci

      - name: Build @graphql-analyzer/core native addon
        run: npm run build:debug --workspace=@graphql-analyzer/core

      - name: Build @graphql-analyzer/eslint-plugin
        run: npm run build --workspace=@graphql-analyzer/eslint-plugin

      - name: Run plugin tests
        run: npm run test:unit --workspace=@graphql-analyzer/eslint-plugin

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Debug info
        run: |
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "oxfmt version: $(npx oxfmt --version)"
          echo "Git SHA: $(git rev-parse HEAD)"
          echo "CLAUDE.md hash: $(git hash-object .claude/CLAUDE.md)"
          echo "hir README hash: $(git hash-object crates/hir/README.md)"

      - name: Check formatting
        run: npm run fmt:check

      - name: Lint
        run: npm run lint

      - name: TypeScript type check
        run: npm run typecheck

  release-prep:
    name: Release Prep Simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: "npm"

      - name: Simulate knope's release-prep
        run: node scripts/check-release-prep.mjs

  web:
    name: Web Playground
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: |
          rustup show
          rustup target add wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "ci-web"

      - name: Install wasm-pack
        uses: taiki-e/install-action@1222bc9d54bca5582f30a2aac6829eeb5fccf68b # v2
        with:
          tool: wasm-pack

      - name: Check wasm-feature build of graphql-lsp
        run: cargo check -p graphql-lsp --no-default-features --features wasm

      - name: Check graphql-lsp-wasm for wasm32-unknown-unknown
        run: cargo check -p graphql-lsp-wasm --target wasm32-unknown-unknown

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .node-version
          cache: "npm"

      - name: Install workspace deps
        run: npm ci

      - name: Build wasm bundle (release)
        run: wasm-pack build crates/lsp-wasm --target web --out-dir $GITHUB_WORKSPACE/packages/web-ide/src/wasm --release

      - name: TypeScript check
        working-directory: packages/web-ide
        run: npx tsc --noEmit

      - name: Build playground (Vite)
        run: npm --workspace=packages/web-ide run build

      - name: Install Playwright browsers
        working-directory: packages/web-ide
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm --workspace=packages/web-ide run test:e2e

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        test,
        lint,
        build,
        check,
        dogfood,
        vscode-extension,
        eslint-plugin,
        format,
        release-prep,
        web,
      ]
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi
          echo "All jobs passed or were skipped"
