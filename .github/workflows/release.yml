name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Only run when a release PR is merged
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Check if release commit
        id: check
        # Use env var to safely pass the commit message to bash.
        # Direct ${{ }} interpolation breaks when the message contains
        # shell-special characters (backticks, quotes, pipes, etc.).
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Manual workflow_dispatch always runs release
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "$COMMIT_MSG" == "chore: prepare release"* ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  # Build CLI, LSP, and MCP binaries for all platforms
  build-binaries:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Add cross-compilation target
        if: ${{ !matrix.cross }}
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        if: ${{ !matrix.cross }}
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "release-${{ matrix.target }}"

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@33e66c8bd28665dcc86c65a058eae26faf2fe0dd # cross
        with:
          tool: cross

      - name: Build binaries
        run: |
          ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} --package graphql-cli
          ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} --package graphql-lsp
          ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} --package graphql-mcp

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist

          # CLI
          cp target/${{ matrix.target }}/release/graphql dist/
          cd dist && tar -cJf graphql-cli-${{ matrix.target }}.tar.xz graphql && rm graphql && cd ..

          # LSP
          cp target/${{ matrix.target }}/release/graphql-lsp dist/
          cd dist && tar -cJf graphql-lsp-${{ matrix.target }}.tar.xz graphql-lsp && rm graphql-lsp && cd ..

          # MCP
          cp target/${{ matrix.target }}/release/graphql-mcp dist/
          cd dist && tar -cJf graphql-mcp-${{ matrix.target }}.tar.xz graphql-mcp && rm graphql-mcp && cd ..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist

          # CLI
          Copy-Item target/${{ matrix.target }}/release/graphql.exe dist/
          Compress-Archive -Path dist/graphql.exe -DestinationPath dist/graphql-cli-${{ matrix.target }}.zip
          Remove-Item dist/graphql.exe

          # LSP
          Copy-Item target/${{ matrix.target }}/release/graphql-lsp.exe dist/
          Compress-Archive -Path dist/graphql-lsp.exe -DestinationPath dist/graphql-lsp-${{ matrix.target }}.zip
          Remove-Item dist/graphql-lsp.exe

          # MCP
          Copy-Item target/${{ matrix.target }}/release/graphql-mcp.exe dist/
          Compress-Archive -Path dist/graphql-mcp.exe -DestinationPath dist/graphql-mcp-${{ matrix.target }}.zip
          Remove-Item dist/graphql-mcp.exe

      - name: Upload binary artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: binaries-${{ matrix.target }}
          path: dist/*

      # Also upload raw LSP binary for VS Code extension bundling
      - name: Upload raw LSP binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lsp-raw-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/graphql-lsp

      - name: Upload raw LSP binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lsp-raw-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/graphql-lsp.exe

  # Build platform-specific VS Code extensions with bundled LSP binary
  build-vscode:
    needs: [check-release, build-binaries]
    if: needs.check-release.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          # Map Rust targets to VS Code targets
          - rust_target: aarch64-apple-darwin
            vscode_target: darwin-arm64
            binary_name: graphql-lsp
          - rust_target: x86_64-apple-darwin
            vscode_target: darwin-x64
            binary_name: graphql-lsp
          - rust_target: aarch64-unknown-linux-gnu
            vscode_target: linux-arm64
            binary_name: graphql-lsp
          - rust_target: x86_64-unknown-linux-gnu
            vscode_target: linux-x64
            binary_name: graphql-lsp
          - rust_target: x86_64-pc-windows-msvc
            vscode_target: win32-x64
            binary_name: graphql-lsp.exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: "npm"
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Download LSP binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: lsp-raw-${{ matrix.rust_target }}
          path: editors/vscode/bin

      - name: Make binary executable
        if: matrix.binary_name != 'graphql-lsp.exe'
        run: chmod +x editors/vscode/bin/${{ matrix.binary_name }}

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Build extension
        working-directory: editors/vscode
        run: npm run compile

      - name: Package platform-specific extension
        working-directory: editors/vscode
        run: npx vsce package --target ${{ matrix.vscode_target }}

      - name: Upload extension artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vscode-extension-${{ matrix.vscode_target }}
          path: editors/vscode/*.vsix

  # Build the @graphql-analyzer/core native addon for each platform.
  # The matrix mirrors build-binaries (5 targets); only linux-arm64-gnu cross
  # compiles, and it uses an apt-installed gcc cross toolchain rather than
  # `cross` (Docker) because napi-rs invokes cargo directly.
  build-core:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_dir: darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            npm_dir: darwin-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm_dir: linux-arm64-gnu
            linux_cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_dir: linux-x64-gnu
            # Picked arbitrarily as the runner that also uploads the
            # platform-independent dispatcher entry points (index.js, index.d.ts)
            # so publish-npm gets exactly one copy.
            dispatcher: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_dir: win32-x64-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        run: rustup show

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: "release-core-${{ matrix.target }}"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: "npm"

      - name: Install workspace deps
        run: npm ci

      - name: Install Linux ARM cross toolchain
        if: matrix.linux_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build native addon
        working-directory: packages/core
        run: npx napi build --cargo-cwd ../../crates/napi --platform --release --target ${{ matrix.target }}

      - name: Upload .node binding
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: core-bindings-${{ matrix.npm_dir }}
          path: packages/core/graphql-analyzer.*.node
          if-no-files-found: error

      # index.js and index.d.ts are platform-independent — every runner produces
      # identical bytes. Upload from a single runner so publish-npm gets one copy.
      - name: Upload dispatcher entry points
        if: matrix.dispatcher
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: core-dispatcher
          path: |
            packages/core/index.js
            packages/core/index.d.ts
          if-no-files-found: error

  # Create GitHub releases and upload all assets
  release:
    needs: [check-release, build-binaries, build-vscode]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - name: Install knope
        uses: knope-dev/action@19617851f9f13ab2f27a05989c55efb18aca3675 # v2.1.2

      - name: Create releases
        run: knope release --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append installation link to releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all package versions
          CLI_VERSION=$(grep -m1 '^version = ' crates/cli/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          LSP_VERSION=$(grep -m1 '^version = ' crates/lsp/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          MCP_VERSION=$(grep -m1 '^version = ' crates/mcp/Cargo.toml | sed 's/version = "\(.*\)"/\1/')

          INSTALL_LINK=$'\n\n---\n\n[Installation Instructions](https://github.com/trevor-scheer/graphql-analyzer#installation)'

          # Append to each release
          for TAG in "graphql-analyzer-cli/v${CLI_VERSION}" "graphql-analyzer-lsp/v${LSP_VERSION}" "graphql-analyzer-mcp/v${MCP_VERSION}"; do
            if CURRENT_BODY=$(gh release view "$TAG" --json body -q .body 2>/dev/null); then
              gh release edit "$TAG" --notes "${CURRENT_BODY}${INSTALL_LINK}"
            fi
          done

  # Publish VS Code extension to marketplace
  publish-vscode:
    needs: [check-release, build-vscode, release]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: "npm"
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: vscode-extension-*
          path: vsix-artifacts
          merge-multiple: true

      - name: List VSIX files
        run: find vsix-artifacts -name "*.vsix" -type f

      - name: Publish to VS Code Marketplace
        working-directory: editors/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PUBLISH_PAT }}
        run: |
          for vsix in ../../vsix-artifacts/*.vsix; do
            echo "Publishing $vsix"
            npx vsce publish --packagePath "$vsix"
          done

  # Publish VS Code extension to Open VSX Registry
  publish-openvsx:
    needs: [check-release, build-vscode, release]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: vscode-extension-*
          path: vsix-artifacts
          merge-multiple: true

      - name: Publish to Open VSX Registry
        env:
          OVSX_PAT: ${{ secrets.OPENVSX_PUBLISH_PAT }}
        run: |
          for vsix in vsix-artifacts/*.vsix; do
            echo "Publishing $vsix"
            npx ovsx publish "$vsix" --pat "$OVSX_PAT"
          done

  # Publish @graphql-analyzer/* packages to npm.
  #
  # Order matters: platform stubs must publish first because the dispatcher pins
  # them via exact-version optionalDependencies; @graphql-analyzer/eslint-plugin
  # publishes last because it depends on @graphql-analyzer/core. Each step is
  # idempotent (`npm view` short-circuits already-published versions) so a
  # partial failure can be recovered by re-running the workflow.
  #
  # OIDC trusted publishing: no NPM_TOKEN required. Each of the 7 published
  # package names must have npmjs.com → trusted publisher → this repo +
  # release.yml + publish-npm job bound on the registry.
  publish-npm:
    needs: [check-release, build-core, release]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install workspace deps
        run: npm ci

      - name: Download .node bindings (all platforms)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: core-bindings-*
          path: napi-artifacts
          merge-multiple: true

      - name: Download dispatcher entry points
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: core-dispatcher
          path: packages/core

      # `napi artifacts` reads the flat dir of `<name>.<platform-suffix>.node`
      # files and copies each into packages/core/npm/<dir>/ based on the suffix.
      - name: Distribute .node bindings into platform stub dirs
        working-directory: packages/core
        run: npx napi artifacts --dir ../../napi-artifacts

      - name: Confirm publish layout
        run: find packages/core packages/eslint-plugin -type f \( -name "*.node" -o -name "index.js" -o -name "index.d.ts" -o -name "package.json" \) -not -path "*/node_modules/*" | sort

      # eslint-plugin's TS imports the dispatcher's index.d.ts, so the dispatcher
      # files (downloaded above) must be in place before tsc runs.
      - name: Build @graphql-analyzer/eslint-plugin
        run: npm run build --workspace=@graphql-analyzer/eslint-plugin

      - name: Publish @graphql-analyzer/core platform stubs
        run: |
          set -euo pipefail
          for dir in packages/core/npm/*/; do
            name=$(node -p "require('./${dir}package.json').name")
            version=$(node -p "require('./${dir}package.json').version")
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "${name}@${version} already published — skipping"
              continue
            fi
            echo "::group::Publishing ${name}@${version}"
            (cd "$dir" && npm publish --provenance --access public)
            echo "::endgroup::"
          done

      - name: Publish @graphql-analyzer/core
        working-directory: packages/core
        run: |
          set -euo pipefail
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "${name}@${version} already published — skipping"
            exit 0
          fi
          npm publish --provenance --access public

      - name: Publish @graphql-analyzer/eslint-plugin
        working-directory: packages/eslint-plugin
        run: |
          set -euo pipefail
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "${name}@${version} already published — skipping"
            exit 0
          fi
          npm publish --provenance --access public

  # Update the Homebrew tap formula with the new CLI version
  update-homebrew-formula:
    needs: [check-release, release]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=$(grep -m1 '^version = ' crates/cli/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          python3 scripts/update-homebrew-formula.py "$VERSION"
