# GraphQL LSP Project Configuration
projects:
  pokemon:
    schema: test-workspace/pokemon/schema.graphql
    documents: "test-workspace/pokemon/src/**/*.{graphql,gql,ts,tsx,js,jsx}"
    extensions:
      graphql-analyzer:
        client: apollo
        lint:
          extends: recommended
          rules:
            uniqueNames: error
            requireIdField: warn

  starwars:
    schema: "test-workspace/starwars/schema.graphql"
    documents: "test-workspace/starwars/src/**/*.{graphql,gql,ts,tsx,js,jsx}"

  github:
    schema:
      - "test-workspace/github/schema/*.graphql"
      - "test-workspace/github/schema/*.ts"
    documents:
      - "test-workspace/github/src/**/*.graphql"
      - "test-workspace/github/src/**/*.ts"
      - "test-workspace/github/src/**/*.tsx"
            noDeprecated: warn
            requireIdField: [warn, { fields: ["id", "databaseId"] }]

  github-admin:
    schema: "test-workspace/github/admin/schema/*.graphql"
    documents: "test-workspace/github/admin/src/**/*.graphql"
            noDeprecated: error
            requireIdField:
              severity: error
              options:
                fields: ["id"]

  countries:
      url: https://countries.trevorblades.com/graphql
      timeout: 30
      retry: 2
    documents: "countries/src/**/*.{graphql,ts}"
        client: none

  apollo-app:
      - test-workspace/apollo-app/schema.graphql
      - test-workspace/apollo-app/client-schema.graphql
    documents: "test-workspace/apollo-app/src/**/*.{graphql,gql,ts,tsx}"

  schema-extensions:
      - test-workspace/schema-extensions/schema.graphql
      - test-workspace/schema-extensions/extensions.graphql
    documents: "test-workspace/schema-extensions/src/**/*.graphql"

  relay-app:
    schema: test-workspace/relay-app/schema.graphql
    documents: "test-workspace/relay-app/src/**/*.{graphql,gql,ts,tsx}"
        client: relay

  lint-ignores:
    schema: test-workspace/lint-ignores/schema.graphql
    documents: "test-workspace/lint-ignores/src/**/*.graphql"

  misconfigured-schema:
    # expect 2 errors: schema file does not exist, and documents file does not exist
    schema: "test-workspace/misconfigured-schema/schema.graphql"
    documents: "test-workspace/misconfigured-schema/query.graphql"

  misconfigured-documents:
    # expect 2 errors: schema file does not exist, and documents file does not exist
    schema: "test-workspace/misconfigured-documents/schema.graphql"
    documents: "test-workspace/misconfigured-documents/query.graphql"

  lint-examples:
    schema: "test-workspace/lint-examples/schema/**/*.graphql"
    documents: "test-workspace/lint-examples/src/**/*.graphql"
            alphabetize: [warn, { selections: true, arguments: true, variables: true }]
            loneExecutableDefinition: warn
            namingConvention: warn
            noDuplicateFields: warn
            selectionSetDepth: [warn, { maxDepth: 3 }]
            noOnePlaceFragments: warn
            descriptionStyle: warn
            inputName: warn
            noHashtagDescription: warn
            noTypenamePrefix: warn
            noUnreachableTypes: warn
            uniqueEnumValueNames: warn
            relayConnectionTypes: warn
            requireDeprecationReason: warn
            requireDescription: warn
            requireFieldOfTypeQueryInMutationResult: warn
            requireNullableFieldsWithOneof: error
            requireTypePatternWithOneof: warn
            strictIdInTypes: warn
            noScalarResultTypeOnMutation: warn
            requireNullableResultInRoot: warn
            relayEdgeTypes: warn
            requireSelections: error

  resolved-schema:
    schema: "test-workspace/resolved-schema/schema/**/*.graphql"
    documents: "test-workspace/resolved-schema/src/**/*.graphql"
        resolvedSchema: "test-workspace/resolved-schema/generated/schema.graphql"
