# yaml-language-server: $schema=./graphqlrc.schema.json
# Or use public URL: https://raw.githubusercontent.com/trevor-scheer/graphql-analyzer/main/crates/graphql-config/schema/graphqlrc.schema.json

# Example GraphQL configuration file with schema validation
# This file demonstrates all supported configuration options

schema: schema.graphql

# Document patterns support gitignore-style negation (patterns starting with !)
# Patterns are processed in order, like .gitignore files
documents:
  - "**/*.{graphql,gql,ts,tsx,js,jsx}"
  # Exclude test files using negation
  - "!**/*.test.ts"
  - "!**/*.test.tsx"
  - "!**/__tests__/**"
  - "!**/__mocks__/**"

# Alternative: use include/exclude fields (legacy, less flexible)
# include:
#   - "src/**/*"
# exclude:
#   - "**/*.test.ts"
#   - "**/__tests__/**"

# Tool-specific extensions (namespaced by tool)
extensions:
  graphql-analyzer:
    # GraphQL client library (apollo, relay, none)
    client: apollo

    # Path to a build-generated schema for validation (optional).
    # When set, queries validate against this file instead of source schema files.
    # resolvedSchema: "generated/schema.graphql"

    # Configuration for extracting GraphQL from TypeScript/JavaScript.
    # Schema mirrors @graphql-tools/graphql-tag-pluck — pluck users can
    # paste their config under `pluckConfig` (alias) and it will work as-is.
    extractConfig:
      gqlMagicComment: "graphql"
      modules:
        - "graphql-tag"
        - { name: "@apollo/client", identifier: "gql" }
      globalGqlIdentifierName: ["gql", "graphql"]

    # Lint configuration
    lint:
      extends: recommended
      rules:
        noDeprecated: warn
        uniqueNames: error
