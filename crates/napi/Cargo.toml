[package]
name = "graphql-analyzer-napi"
version = "0.1.3"
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "napi-rs bindings that expose graphql-analyzer to Node.js (published as @graphql-analyzer/core)"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", features = ["napi9", "serde-json"] }
napi-derive = "2"
serde_json.workspace = true
graphql-ide = { path = "../ide" }
graphql-linter = { path = "../linter" }
graphql-extract = { path = "../extract" }
graphql-config = { path = "../config" }
parking_lot = "0.12"
anyhow.workspace = true

[build-dependencies]
napi-build = "2"
