# GraphQL LSP Project Configuration
projects:
  pokemon:
    schema: pokemon/schema.graphql
    documents: "pokemon/src/**/*.{graphql,gql,ts,tsx,js,jsx}"
    extensions:
      client: apollo
      lint:
        extends: recommended
        rules:
          uniqueNames: error
          requireIdField: warn

  starwars:
    schema: "starwars/schema.graphql"
    documents: "starwars/src/**/*.{graphql,gql,ts,tsx,js,jsx}"
    extensions:
      client: apollo
      lint:
        extends: recommended
        rules:
          uniqueNames: error
          requireIdField: warn

  github:
    schema:
      - "github/schema/*.graphql"
      - "github/schema/*.ts"
    documents:
      - "github/src/**/*.graphql"
      - "github/src/**/*.ts"
      - "github/src/**/*.tsx"
    extensions:
      client: apollo
      lint:
        extends: recommended
        rules:
          uniqueNames: error
          noDeprecated: warn
          requireIdField: [warn, { fields: ["id", "databaseId"] }]

  github-admin:
    schema: "github/admin/schema/*.graphql"
    documents: "github/admin/src/**/*.graphql"
    extensions:
      client: apollo
      lint:
        extends: recommended
        rules:
          uniqueNames: error
          noDeprecated: error
          requireIdField:
            severity: error
            options:
              fields: ["id"]

  countries:
    schema:
      url: https://countries.trevorblades.com/graphql
      timeout: 30
      retry: 2
    documents: "countries/src/**/*.{graphql,ts}"
    extensions:
      client: none
      lint:
        extends: recommended
        rules:
          uniqueNames: error
          requireIdField: warn

  apollo-app:
    schema:
      - apollo-app/schema.graphql
      - apollo-app/client-schema.graphql
    documents: "apollo-app/src/**/*.{graphql,gql,ts,tsx}"
    extensions:
      client: apollo
      lint:
        extends: recommended
        rules:
          uniqueNames: error

  schema-extensions:
    schema:
      - schema-extensions/schema.graphql
      - schema-extensions/extensions.graphql
    documents: "schema-extensions/src/**/*.graphql"
    extensions:
      client: none
      lint:
        extends: recommended
        rules:
          uniqueNames: error

  relay-app:
    schema: relay-app/schema.graphql
    documents: "relay-app/src/**/*.{graphql,gql,ts,tsx}"
    extensions:
      client: relay
      lint:
        extends: recommended
        rules:
          uniqueNames: error

  misconfigured-schema:
    # expect 2 errors: schema file does not exist, and documents file does not exist
    schema: "misconfigured-schema/schema.graphql"
    documents: "misconfigured-schema/query.graphql"
    extensions:
      client: none

  misconfigured-documents:
    # expect 2 errors: schema file does not exist, and documents file does not exist
    schema: "misconfigured-documents/schema.graphql"
    documents: "misconfigured-documents/query.graphql"
    extensions:
      client: none
