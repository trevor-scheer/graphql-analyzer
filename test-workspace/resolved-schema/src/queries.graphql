# These queries reference fields from the resolved schema.
# Without resolvedSchema config, `permissions` would show a validation error
# because it doesn't exist in the source schema.

query GetUserWithPermissions($id: ID!) {
  user(id: $id) {
    id
    name
    email
    permissions {
      id
      name
      resource
      actions
    }
  }
}

query ListUsers {
  users {
    id
    name
    role
  }
}
